<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Messe Challenge Leaderboard</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    text-align: center;
    margin: 0;
    padding: 20px;
}

h1 {
    margin-bottom: 30px;
}

table {
    margin: auto;
    width: 80%;
    border-collapse: collapse;
}

th {
    color: #00ff99;
    font-size: 26px;
    padding: 15px;
    border-bottom: 2px solid #00ff99;
}

td {
    padding: 15px;
    font-size: 24px;
    border-bottom: 1px solid #333;
}

tr:nth-child(2) td {
    color: gold;
    font-weight: bold;
}

tr:nth-child(3) td {
    color: silver;
    font-weight: bold;
}

tr:nth-child(4) td {
    color: #cd7f32;
    font-weight: bold;
}
</style>

</head>
<body>

<h1>🏁 Messe Challenge Leaderboard</h1>

<table id="board">
    <tr>
        <th>Platz</th>
        <th>Name</th>
        <th>Firma</th>
        <th>Zeit</th>
    </tr>
</table>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vRaFMS8eoUyhw7LfgrrYnS8zqmJYbmxD56vUn0OR8SFsamm3tLISpUIRiufwjq4tA-P11TLez2cxh_z/pub?gid=0&single=true&output=csv";

async function loadData() {

    const res = await fetch(sheetURL);
    const text = await res.text();

    const rows = text.trim().split("\n").slice(1);

    let data = [];

    for (let row of rows) {

        if (!row.trim()) continue;

        const cols = row.split(",");

        const rank = (cols[0] || "").replace(/"/g, "").trim();
        const name = (cols[1] || "").replace(/"/g, "").trim();
        const company = (cols[2] || "").replace(/"/g, "").trim();

        let timeText = (cols[3] || "")
            .replace(/"/g, "")
            .trim()
            .replace(",", ".");

        const time = parseFloat(timeText);

        if (
            !name ||
            name === "#N/A" ||
            rank === "#N/A" ||
            isNaN(time)
        ) {
            continue;
        }

        data.push({
            rank,
            name,
            company,
            time
        });
    }

    data.sort((a, b) => a.time - b.time);

    const table = document.getElementById("board");

    table.innerHTML = `
        <tr>
            <th>Platz</th>
            <th>Name</th>
            <th>Firma</th>
            <th>Zeit</th>
        </tr>
    `;

    data.forEach((player, index) => {

        table.innerHTML += `
            <tr>
                <td>${index + 1}</td>
                <td>${player.name}</td>
                <td>${player.company}</td>
                <td>${player.time.toFixed(2)} s</td>
            </tr>
        `;
    });
}

loadData();
setInterval(loadData, 3000);

</script>

</body>
</html>
