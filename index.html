<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Messe Challenge Leaderboard</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    text-align: center;
    margin: 0;
    padding: 20px;
}

h1 {
    margin-bottom: 30px;
}

table {
    margin: auto;
    width: 80%;
    border-collapse: collapse;
}

th {
    color: #00ff99;
    font-size: 26px;
    padding: 15px;
    border-bottom: 2px solid #00ff99;
}

td {
    padding: 15px;
    font-size: 24px;
    border-bottom: 1px solid #333;
}

tr:nth-child(2) td {
    color: gold;
    font-weight: bold;
}

tr:nth-child(3) td {
    color: silver;
    font-weight: bold;
}

tr:nth-child(4) td {
    color: #cd7f32;
    font-weight: bold;
}
</style>

</head>
<body>

<h1>Leaderboard</h1>

<table id="board">
    <tr>
        <th>Platz</th>
        <th>Name</th>
        <th>Firma</th>
        <th>Zeit</th>
    </tr>
</table>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vRaFMS8eoUyhw7LfgrrYnS8zqmJYbmxD56vUn0OR8SFsamm3tLISpUIRiufwjq4tA-P11TLez2cxh_z/pub?gid=0&single=true&output=csv";

/*
  Wandelt z.B.
  0:12.34 -> 12.34 Sekunden
  1:03.57 -> 63.57 Sekunden
*/
function parseTime(timeText) {

    const parts = timeText.trim().split(":");

    if (parts.length !== 2) {
        return NaN;
    }

    const minutes = parseInt(parts[0], 10);
    const seconds = parseFloat(parts[1]);

    return (minutes * 60) + seconds;
}

/*
  Wandelt Sekunden zurück in:
  M:SS.hh
*/
function formatTime(totalSeconds) {

    const minutes = Math.floor(totalSeconds / 60);

    const seconds = totalSeconds % 60;

    return (
        minutes +
        ":" +
        seconds.toFixed(2).padStart(5, "0")
    );
}

async function loadData() {

    try {

        const res = await fetch(sheetURL);
        const text = await res.text();

        const rows = text.trim().split("\n").slice(1);

        let data = [];

        for (let row of rows) {

            if (!row.trim()) continue;

            const cols = row.split(",");

            const name = (cols[0] || "")
                .replace(/"/g, "")
                .trim();

            const company = (cols[1] || "")
                .replace(/"/g, "")
                .trim();

            const timeText = (cols[2] || "")
                .replace(/"/g, "")
                .trim();

            const time = parseTime(timeText);

            if (
                !name ||
                name === "#N/A" ||
                isNaN(time)
            ) {
                continue;
            }

            data.push({
                name,
                company,
                time
            });
        }

        // Schnellste Zeit zuerst
        data.sort((a, b) => a.time - b.time);

        const table = document.getElementById("board");

        table.innerHTML = `
            <tr>
                <th>Platz</th>
                <th>Name</th>
                <th>Firma</th>
                <th>Zeit</th>
            </tr>
        `;

        data.forEach((player, index) => {

            table.innerHTML += `
                <tr>
                    <td>${index + 1}</td>
                    <td>${player.name}</td>
                    <td>${player.company}</td>
                    <td>${formatTime(player.time)}</td>
                </tr>
            `;
        });

    } catch (error) {

        console.error("Fehler beim Laden:", error);

        document.getElementById("board").innerHTML = `
            <tr>
                <th>Platz</th>
                <th>Name</th>
                <th>Firma</th>
                <th>Zeit</th>
            </tr>
            <tr>
                <td colspan="4">Fehler beim Laden der Daten</td>
            </tr>
        `;
    }
}

loadData();
setInterval(loadData, 2000);

</script>

</body>
</html>
